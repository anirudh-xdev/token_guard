<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenGuard Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        } 

        body { 
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 25%);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--glass-bg);
            border-right: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 3rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* Cards and Tables */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(12px);
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .mono {
            font-family: monospace;
            color: var(--accent-blue);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-text:hover {
            color: white;
        }

        /* Loading & Errors */
        .status-message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3b82f6" />
                        <stop offset="100%" stop-color="#8b5cf6" />
                    </linearGradient>
                </defs>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            TokenGuard
        </div>
        <div class="nav-item active" onclick="loadDashboard()">Dashboard</div>
        <div class="nav-item">API Keys</div>
        <div class="nav-item">Settings</div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>Overview</h1>
            <button class="btn-primary" onclick="openModal()">+ Provision User</button>
        </div>

        <div id="error-msg" class="status-message error"></div>

        <!-- Users Table -->
        <div class="glass-card">
            <div class="card-header">
                <h2 class="card-title">Managed Users</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>User ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Budget ($)</th>
                        <th>Spent ($)</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Loading users...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Usage Table -->
        <div class="glass-card">
            <div class="card-header">
                <h2 class="card-title">Recent API Usage</h2>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Model</th>
                        <th>User</th>
                        <th>Tokens (In / Out)</th>
                        <th>Cost ($)</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="usage-tbody">
                    <tr><td colspan="5" style="text-align:center; color:var(--text-muted);">Loading usage...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Provision Modal -->
    <div class="modal-backdrop" id="provisionModal">
        <div class="modal">
            <h2 style="margin-top:0; margin-bottom: 2rem;">Provision New User</h2>
            
            <div id="modal-error" class="status-message error" style="display:none; font-size:0.9rem;"></div>
            <div id="modal-success" class="status-message" style="display:none; font-size:0.9rem; background: rgba(16,185,129,0.1); border: 1px solid var(--success); color: var(--success); padding: 1.5rem;">
                <strong>Success!</strong><br><br>
                Please save this TokenGuard Key securely:<br>
                <code id="new-api-key" style="display:inline-block; margin-top:10px; padding:8px; background: rgba(0,0,0,0.3); border-radius:4px; font-size:1.1rem; color: #fff;"></code>
            </div>

            <div id="form-container">
                <div class="form-group">
                    <label class="form-label">Name</label>
                    <input type="text" id="input-name" class="form-input" placeholder="e.g. Acme Corp">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="input-email" class="form-input" placeholder="admin@acme.com">
                </div>
                <div class="modal-actions">
                    <button class="btn-text" onclick="closeModal()">Cancel</button>
                    <button class="btn-primary" onclick="submitProvision()">Create User & Key</button>
                </div>
            </div>
            
            <div id="success-actions" class="modal-actions" style="display:none; justify-content:center;">
                <button class="btn-primary" onclick="closeModal(); loadDashboard();">Done</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const API_BASE = localStorage.getItem('tokenguard_api_base') || window.location.origin;
        const ADMIN_SECRET = localStorage.getItem('tokenguard_admin_secret') || prompt('TokenGuard admin secret') || '';
        if (ADMIN_SECRET) {
            localStorage.setItem('tokenguard_admin_secret', ADMIN_SECRET);
        }

        const headers = {
            'X-TokenGuard-Admin-Secret': ADMIN_SECRET,
            'Content-Type': 'application/json'
        };

        function formatUSD(microUSD) {
            return '$' + (microUSD / 1000000).toFixed(4);
        }

        async function loadDashboard() {
            try {
                // Fetch Users
                const uRes = await fetch(`${API_BASE}/mgmt/users`, { headers });
                const uData = await uRes.json();
                
                const uTbody = document.getElementById('users-tbody');
                if (uData.users && uData.users.length > 0) {
                    uTbody.innerHTML = uData.users.map(u => `
                        <tr>
                            <td class="mono">${u.user_id}</td>
                            <td>${u.name || '-'}</td>
                            <td>${u.email}</td>
                            <td>${formatUSD(u.limit_microusd)}</td>
                            <td>${formatUSD(u.spent_microusd)}</td>
                        </tr>
                    `).join('');
                } else {
                    uTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No users found.</td></tr>';
                }

                // Fetch Usage
                const rRes = await fetch(`${API_BASE}/mgmt/usage?limit=10`, { headers });
                const rData = await rRes.json();
                
                const rTbody = document.getElementById('usage-tbody');
                if (rData.events && rData.events.length > 0) {
                    rTbody.innerHTML = rData.events.map(e => `
                        <tr>
                            <td><strong>${e.model}</strong></td>
                            <td class="mono">${e.user_id}</td>
                            <td>${e.input_tokens} / ${e.output_tokens}</td>
                            <td>${formatUSD(e.actual_cost_microusd)}</td>
                            <td>
                                <span class="badge ${e.status === 'completed' ? 'badge-success' : 'badge-danger'}">
                                    ${e.status}
                                </span>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    rTbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No recent usage.</td></tr>';
                }

            } catch (err) {
                const msg = document.getElementById('error-msg');
                msg.style.display = 'block';
                msg.innerText = 'Error connecting to TokenGuard API: ' + err.message;
            }
        }

        // Modal Logic
        function openModal() {
            document.getElementById('provisionModal').style.display = 'flex';
            document.getElementById('form-container').style.display = 'block';
            document.getElementById('success-actions').style.display = 'none';
            document.getElementById('modal-success').style.display = 'none';
            document.getElementById('modal-error').style.display = 'none';
            document.getElementById('input-name').value = '';
            document.getElementById('input-email').value = '';
        }

        function closeModal() {
            document.getElementById('provisionModal').style.display = 'none';
        }

        async function submitProvision() {
            const name = document.getElementById('input-name').value;
            const email = document.getElementById('input-email').value;
            const errorDiv = document.getElementById('modal-error');

            if (!email) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Email is required.";
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/mgmt/provision`, {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify({ email, name })
                });

                const data = await res.json();
                
                if (!res.ok) {
                    throw new Error(data.error || 'Failed to provision user');
                }

                document.getElementById('form-container').style.display = 'none';
                document.getElementById('modal-error').style.display = 'none';
                
                const successDiv = document.getElementById('modal-success');
                successDiv.style.display = 'block';
                document.getElementById('new-api-key').innerText = data.api_key;
                
                document.getElementById('success-actions').style.display = 'flex';

            } catch (err) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = err.message;
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
